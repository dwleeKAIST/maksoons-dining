steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}'
      - '--build-arg=VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg=VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}'
      - '--build-arg=VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg=VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg=VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}'
      - '-t'
      - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/maksoons-dining/app:$COMMIT_SHA'
      - '-t'
      - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/maksoons-dining/app:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/maksoons-dining/app:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/maksoons-dining/app:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'maksoons-dining'
      - '--image=asia-northeast3-docker.pkg.dev/$PROJECT_ID/maksoons-dining/app:$COMMIT_SHA'
      - '--region=asia-northeast3'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--port=8080'
      - '--set-env-vars=NODE_ENV=production,PORTAL_NAME=Maksoons Dining,ANTHROPIC_API_KEY=${_ANTHROPIC_API_KEY},ADMIN_TELEGRAM_BOT_TOKEN=${_ADMIN_TELEGRAM_BOT_TOKEN},ADMIN_TELEGRAM_CHAT_ID=${_ADMIN_TELEGRAM_CHAT_ID}'
      - '--update-env-vars=^||^FIREBASE_SERVICE_ACCOUNT=${_FIREBASE_SERVICE_ACCOUNT}||ADMIN_EMAILS=${_ADMIN_EMAILS}||DATABASE_URL=${_DATABASE_URL}'
      - '--add-cloudsql-instances=${_CLOUD_SQL_INSTANCE}'

images:
  - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/maksoons-dining/app:$COMMIT_SHA'
  - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/maksoons-dining/app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
